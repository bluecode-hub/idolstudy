<!DOCTYPE html>
<html>
  <head>
    <title>Idol Focus</title>
    <style>
      body {
        min-width: 220px;
        margin: 0;
        padding: 16px;
        font-family: Arial, sans-serif;
        color: #0f172a;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      p {
        margin: 0 0 12px;
        color: #475569;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-weight: 700;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <h2>Idol Focus</h2>
    <p id="status">Checking focus mode...</p>
    <button id="toggle" type="button">
      Toggle Focus Mode
    </button>
    <script src="popup.js"></script>
  </body>
</html>
