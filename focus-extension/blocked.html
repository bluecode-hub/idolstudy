<!DOCTYPE html>
<html>
  <head>
    <title>Focus Mode Active</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(420px, calc(100% - 32px));
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: white;
        padding: 28px;
        text-align: center;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: #475569;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        margin-top: 10px;
        padding: 12px 16px;
      }

      #return {
        background: #2563eb;
        color: white;
      }

      #disable {
        background: #e2e8f0;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Focus Mode Active</h1>

      <p>
        Goal:
        <strong id="goal">Study session</strong>
      </p>

      <p>
        Remaining:
        <strong id="remaining">Keep going</strong>
      </p>

      <button id="return" type="button">
        Back To Study Session
      </button>

      <button id="disable" type="button">
        Disable Focus Mode
      </button>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
